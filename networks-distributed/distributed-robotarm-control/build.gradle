plugins {
    // Apply the java plugin for building Java projects.
    id 'java'
    id 'org.openjfx.javafxplugin' version '0.1.0' // Use the latest version
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

javafx {
    version = "21.0.2" // Your requested version
    modules = [ 'javafx.controls', 'javafx.fxml' ] // Your requested modules
}

dependencies {
    // GSON dependency
    implementation 'com.google.code.gson:gson:2.13.2'
    // implementation 'org.apache.activemq:activemq-client:5.15.6'
    implementation 'org.slf4j:slf4j-simple:2.0.17'

    // JUnit Jupiter API & Engine for Java 21 compatibility
    // testImplementation 'org.junit.jupiter:junit-jupiter-api:5.10.1'
    // testImplementation 'org.junit.jupiter:junit-jupiter-engine:5.10.1'
    // testImplementation 'org.junit.jupiter:junit-jupiter-params:5.10.1'

    implementation files ('libs/CaDSRoboticArmInterface.jar')

    implementation files ('libs/CaDSControlGUI.jar')

    implementation files ('libs/CaDSLogger.jar')

    // AssertJ for fluent assertions
    // testImplementation 'org.assertj:assertj-core:3.24.2'
    // testRuntimeOnly("org.junit.platform:junit-platform-launcher")


    // Use JUnit Jupiter for testing.
    testImplementation libs.junit.jupiter
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    // This dependency is used by the application.
    implementation libs.guava
}

// Apply a specific Java toolchain to ease working on different environments.
// java {
//     toolchain {
//         languageVersion = JavaLanguageVersion.of(21)
//     }
// }

// application {
//     // Define the main class for the application.
//     mainClass = 'TerminalClient.Client'
// }

tasks.register('registryServerJar', Jar) {
    archiveBaseName = 'registry-server'
    from sourceSets.main.output

    // Make worker jar self-contained as well
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }

    manifest {
        attributes 'Main-Class': 'RegistryService.RegistryServer'
    }

    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    dependsOn classes
}

tasks.register('terminalClientJar', Jar) {
    archiveBaseName = 'terminal-client'
    from sourceSets.main.output

    // Make worker jar self-contained as well
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }

    manifest {
        attributes 'Main-Class': 'TerminalClient.Client'
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    dependsOn classes
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}

build {
    dependsOn 'registryServerJar', 'terminalClientJar'
}

tasks.register('robotNodeJar', Jar) {
    archiveBaseName = 'robot-node'
    from sourceSets.main.output

    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }

    manifest {
        attributes 'Main-Class': 'RobotNode.RobotNode'
    }

    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    dependsOn classes
}

// Update build task to include robotNodeJar
build {
    dependsOn 'registryServerJar', 'terminalClientJar', 'robotNodeJar'
}